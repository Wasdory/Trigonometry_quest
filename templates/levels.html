<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровни - Trigonometry Quest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        
        .header h1 {
            color: #4CAF50;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #e9ecef;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4CAF50;
            margin: 10px 0;
        }
        
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .level-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            border: 3px solid #ddd;
            transition: all 0.3s;
            position: relative;
        }
        
        .level-card.unlocked {
            border-color: #4CAF50;
            cursor: pointer;
        }
        
        .level-card.unlocked:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .level-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .level-number {
            position: absolute;
            top: -15px;
            left: -15px;
            width: 40px;
            height: 40px;
            background: #4CAF50;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .level-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .level-title {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .level-desc {
            color: #666;
            margin-bottom: 15px;
            min-height: 40px;
        }
        
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #4CAF50;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #666;
        }
        
        .start-btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .start-btn:hover {
            background: #45a049;
        }
        
        .locked-label {
            text-align: center;
            padding: 10px;
            background: #ff9800;
            color: white;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="header-container">
            <a href="/" class="logo-link">
                <div class="logo">
                    <i class="fas fa-calculator"></i>
                    <h1>Trigonometry Quest</h1>
                </div>
            </a>
            <nav class="header-nav">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i> Главная
                </a>
                <a href="/game" class="nav-link">
                    <i class="fas fa-gamepad"></i> Игра
                </a>
                <a href="/levels" class="nav-link active">
                    <i class="fas fa-layer-group"></i> Уровни
                </a>
                <a href="/lab" class="nav-link">
                    <i class="fas fa-flask"></i> Лаборатория
                </a>
            </nav>
            <div class="header-user">
                <span class="user-score-header">
                    <i class="fas fa-star"></i> <span id="header-score">0</span>
                </span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="header">
            <h1>📚 Уровни Trigonometry Quest</h1>
            <p>Изучайте тригонометрию шаг за шагом</p>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div>Общий счет</div>
                <div class="stat-value" id="total-score">0</div>
            </div>
            <div class="stat-card">
                <div>Решено задач</div>
                <div class="stat-value" id="solved-tasks">0</div>
            </div>
            <div class="stat-card">
                <div>Текущий уровень</div>
                <div class="stat-value" id="current-level">1</div>
            </div>
            <div class="stat-card">
                <div>Пройдено уровней</div>
                <div class="stat-value" id="completed-levels">0</div>
            </div>
        </div>
        
        <div class="levels-grid" id="levels-container">
            <!-- Уровни будут загружены сюда -->
        </div>
    </div>

    <script>
        async function loadLevels() {
            try {
                // Загружаем статистику
                const statsRes = await fetch('/api/game/stats');
                const statsData = await statsRes.json();
                const stats = statsData;
                
                // Загружаем уровни
                const levelsRes = await fetch('/api/levels');
                const levelsData = await levelsRes.json();
                const levels = levelsData.levels;
                
                updateStats(stats, levels);
                displayLevels(levels, stats);
                
                // Обновляем счет в шапке
                document.getElementById('header-score').textContent = stats.score || 0;
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('levels-container').innerHTML = 
                    '<div style="text-align:center; padding:50px; color:red;">Ошибка загрузки</div>';
            }
        }
        
        function updateStats(stats, levels) {
            document.getElementById('total-score').textContent = stats.score || 0;
            document.getElementById('solved-tasks').textContent = stats.total_tasks || 0;
            
            let currentLevel = 1;
            let completedLevels = 0;
            
            for (let i = 1; i <= 5; i++) {
                if (levels[i] && levels[i].unlocked) {
                    currentLevel = Math.max(currentLevel, i);
                }
                if (levels[i] && levels[i].is_completed) {
                    completedLevels++;
                }
            }
            
            document.getElementById('current-level').textContent = currentLevel;
            document.getElementById('completed-levels').textContent = completedLevels;
        }
        
        function displayLevels(levels, stats) {
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= 5; i++) {
                const level = levels[i];
                if (!level) continue;
                
                const progress = stats.level_progress?.[i] || { completed: 0 };
                const progressPercent = (progress.completed / 2) * 100;
                
                const card = document.createElement('div');
                card.className = `level-card ${level.unlocked ? 'unlocked' : 'locked'}`;
                card.style.borderColor = level.color;
                
                card.innerHTML = `
                    <div class="level-number">${i}</div>
                    <div class="level-icon">${level.icon}</div>
                    <h3 class="level-title" style="color: ${level.color}">Уровень ${i}: ${level.name}</h3>
                    <p class="level-desc">${level.desc}</p>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPercent}%"></div>
                    </div>
                    <div class="progress-text">
                        <span>Прогресс</span>
                        <span>${progress.completed || 0}/2 задач</span>
                    </div>
                    
                    ${level.unlocked ? 
                        `<button class="start-btn" onclick="startLevel(${i})">
                            ${progress.completed >= 2 ? '🔄 Повторить' : '🚀 Начать'}
                        </button>` :
                        `<div class="locked-label">🔒 Заблокировано</div>`
                    }
                `;
                
                container.appendChild(card);
            }
        }
        
        function startLevel(levelId) {
            window.location.href = `/game?level=${levelId}`;
        }
        
        // Загружаем при старте
        document.addEventListener('DOMContentLoaded', loadLevels);
    </script>
</body>
</html>
